name: ${COREARR_STACK_NAME:-${CORERADIO_STACK_NAME:-corearr}}

services:
  corearr:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUN_TESTS: ${COREARR_RUN_TESTS:-false}
    container_name: ${COREARR_CONTAINER_NAME:-${CORERADIO_CONTAINER_NAME:-corearr}}
    init: true
    env_file:
      - stack.env
    ports:
      - "${COREARR_PORT:-${CORERADIO_PORT:-8080}}:8080"
    environment:
      PORT: "8080"
      DATA_DIR: /data
      DOWNLOAD_DIR: /downloads
    volumes:
      - ${COREARR_DATA_PATH:-${CORERADIO_DATA_PATH:-./data}}:/data
      - ${COREARR_DOWNLOADS_PATH:-${CORERADIO_DOWNLOADS_PATH:-./downloads}}:/downloads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
