services:
  coreradio-index:
    image: ${CORERADIO_IMAGE:-coreradio-index:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CORERADIO_CONTAINER_NAME:-coreradio-index}
    init: true
    env_file:
      - stack.env
    ports:
      - "${CORERADIO_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      DATA_DIR: /data
      DOWNLOAD_DIR: /downloads
    volumes:
      - ${CORERADIO_DATA_PATH:-./data}:/data
      - ${CORERADIO_DOWNLOADS_PATH:-./downloads}:/downloads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
